<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 220px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let timeData;
    let frequencyData;

    let animationId = null;
    let isDrawing = false;


    // ==========================================
    // TIMELINE ARCHITECTURE
    // ==========================================

    // Visible capsules
    const BAR_COUNT = 56;

    // New stored audio measurement rate.
    // 56 / 7 = ~8 seconds visible.
    const HISTORY_FPS = 7;

    const HISTORY_INTERVAL =
      1000 / HISTORY_FPS;

    // Visual rendering target.
    // Motion is interpolated between history pushes.
    const VISUAL_FPS = 24;

    const VISUAL_INTERVAL =
      1000 / VISUAL_FPS;


    // ==========================================
    // VISUAL APPEARANCE
    // ==========================================

    const CORE_WIDTH = 9;
    const BODY_WIDTH = 17;

    const MIN_HEIGHT = 2.5;

    const MAX_HEIGHT_RATIO = 0.88;


    // ==========================================
    // DYNAMIC RANGE
    // ==========================================

    const INPUT_FLOOR = 0.055;
    const INPUT_CEILING = 0.42;

    const RESPONSE_CURVE = 1.38;

    const RMS_WEIGHT = 0.78;
    const PEAK_WEIGHT = 0.22;


    // ==========================================
    // RESPONSE
    // ==========================================

    const ATTACK = 0.76;
    const RELEASE = 0.28;


    // ==========================================
    // TRANSIENT EMPHASIS
    // ==========================================

    const TRANSIENT_AMOUNT = 0.34;
    const MAX_TRANSIENT_ADD = 0.28;

    let previousRms = 0;


    // ==========================================
    // SNARE EMPHASIS
    // ==========================================

    const SNARE_AMOUNT = 0.10;


    // ==========================================
    // HISTORY STATE
    // ==========================================

    // One extra value is stored so interpolation
    // remains smooth at the left edge.
    const history =
      new Float32Array(BAR_COUNT + 1);

    let lastHistoryUpdate = 0;
    let lastVisualUpdate = 0;

    let smoothedAmplitude = 0;


    // ==========================================
    // CANVAS
    // ==========================================

    function resizeCanvas() {

      const dpr =
        window.devicePixelRatio || 1;

      canvas.width =
        Math.round(
          canvas.clientWidth * dpr
        );

      canvas.height =
        Math.round(
          canvas.clientHeight * dpr
        );
    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );


    // ==========================================
    // AUDIO INITIALIZATION
    // ==========================================

    function initializeAudio() {

      if (audioContext) return;

      audioContext =
        new AudioContext();

      analyser =
        audioContext.createAnalyser();

      analyser.fftSize = 2048;

      analyser.smoothingTimeConstant =
        0.18;

      source =
        audioContext.createMediaElementSource(
          audio
        );

      source.connect(analyser);

      analyser.connect(
        audioContext.destination
      );

      timeData =
        new Uint8Array(
          analyser.fftSize
        );

      frequencyData =
        new Uint8Array(
          analyser.frequencyBinCount
        );
    }


    // ==========================================
    // PLAYBACK
    // ==========================================

    audio.addEventListener(
      "play",
      async () => {

        initializeAudio();

        if (
          audioContext.state === "suspended"
        ) {
          await audioContext.resume();
        }

        if (!isDrawing) {

          isDrawing = true;

          const now =
            performance.now();

          lastHistoryUpdate = now;
          lastVisualUpdate = 0;

          draw(now);
        }
      }
    );


    audio.addEventListener(
      "pause",
      stopDrawing
    );


    audio.addEventListener(
      "ended",
      stopDrawing
    );


    function stopDrawing() {

      isDrawing = false;

      if (animationId !== null) {

        cancelAnimationFrame(
          animationId
        );

        animationId = null;
      }
    }


    // ==========================================
    // COLOR
    // ==========================================

    function colorForPosition(
      position,
      alpha = 1
    ) {

      // Clamp because interpolated capsules
      // can temporarily sit slightly outside.
      position =
        Math.max(
          0,
          Math.min(1, position)
        );

      let r;
      let g;
      let b;


      if (position < 0.33) {

        const t =
          position / 0.33;

        r = 0 + 45 * t;
        g = 220 - 110 * t;
        b = 255;

      } else if (position < 0.66) {

        const t =
          (position - 0.33) / 0.33;

        r = 45 + 115 * t;
        g = 110 - 55 * t;
        b = 255;

      } else {

        const t =
          (position - 0.66) / 0.34;

        r = 160 + 95 * t;
        g = 55 - 35 * t;
        b = 255 - 35 * t;
      }


      return (
        "rgba(" +
        Math.round(r) + "," +
        Math.round(g) + "," +
        Math.round(b) + "," +
        alpha +
        ")"
      );
    }


    // ==========================================
    // AUDIO MEASUREMENT
    // ==========================================

    function measureAudio() {

      analyser.getByteTimeDomainData(
        timeData
      );

      analyser.getByteFrequencyData(
        frequencyData
      );


      // ----------------------------------------
      // RMS + PEAK
      // ----------------------------------------

      let sumSquares = 0;
      let peak = 0;


      for (
        let i = 0;
        i < timeData.length;
        i++
      ) {

        const sample =
          (timeData[i] - 128) / 128;

        const absSample =
          Math.abs(sample);

        sumSquares +=
          sample * sample;

        if (absSample > peak) {
          peak = absSample;
        }
      }


      const rms =
        Math.sqrt(
          sumSquares /
          timeData.length
        );


      const rawLevel =
        rms * RMS_WEIGHT +
        peak * PEAK_WEIGHT;


      // ----------------------------------------
      // NORMALIZE
      // ----------------------------------------

      let normalized =
        (
          rawLevel -
          INPUT_FLOOR
        ) /
        (
          INPUT_CEILING -
          INPUT_FLOOR
        );


      normalized =
        Math.max(
          0,
          Math.min(1, normalized)
        );


      normalized =
        Math.pow(
          normalized,
          RESPONSE_CURVE
        );


      // ----------------------------------------
      // TRANSIENT DETECTION
      // ----------------------------------------

      const rmsRise =
        Math.max(
          0,
          rms - previousRms
        );


      let transientAdd =
        rmsRise *
        TRANSIENT_AMOUNT *
        10;


      transientAdd =
        Math.min(
          MAX_TRANSIENT_ADD,
          transientAdd
        );


      previousRms =
        previousRms * 0.72 +
        rms * 0.28;


      // ----------------------------------------
      // UPPER-MID / SNARE ENERGY
      // ----------------------------------------

      const nyquist =
        audioContext.sampleRate / 2;


      const binHz =
        nyquist /
        frequencyData.length;


      const lowBin =
        Math.floor(
          1800 / binHz
        );


      const highBin =
        Math.min(
          frequencyData.length - 1,
          Math.floor(
            6500 / binHz
          )
        );


      let upperMidEnergy = 0;
      let count = 0;


      for (
        let i = lowBin;
        i <= highBin;
        i++
      ) {

        upperMidEnergy +=
          frequencyData[i] / 255;

        count++;
      }


      if (count > 0) {
        upperMidEnergy /= count;
      }


      const snareThreshold =
        Math.max(
          0,
          upperMidEnergy - 0.22
        );


      const snareAdd =
        snareThreshold *
        SNARE_AMOUNT;


      // ----------------------------------------
      // FINAL TARGET
      // ----------------------------------------

      let target =
        normalized +
        transientAdd +
        snareAdd;


      target =
        Math.max(
          0,
          Math.min(1, target)
        );


      // ----------------------------------------
      // ATTACK / RELEASE
      // ----------------------------------------

      const response =
        target > smoothedAmplitude
          ? ATTACK
          : RELEASE;


      smoothedAmplitude +=
        (
          target -
          smoothedAmplitude
        ) * response;


      return Math.max(
        0,
        Math.min(
          1,
          smoothedAmplitude
        )
      );
    }


    // ==========================================
    // HISTORY
    // ==========================================

    function pushHistory(value) {

      for (
        let i = 0;
        i < history.length - 1;
        i++
      ) {

        history[i] =
          history[i + 1];
      }


      history[
        history.length - 1
      ] = value;
    }


    // ==========================================
    // DRAW
    // ==========================================

    function draw(timestamp) {

      if (!isDrawing) return;


      animationId =
        requestAnimationFrame(draw);


      // ----------------------------------------
      // PUSH NEW AUDIO HISTORY
      // ----------------------------------------

      while (
        timestamp -
        lastHistoryUpdate >=
        HISTORY_INTERVAL
      ) {

        const amplitude =
          measureAudio();

        pushHistory(amplitude);

        lastHistoryUpdate +=
          HISTORY_INTERVAL;
      }


      // ----------------------------------------
      // LIMIT VISUAL REDRAW TO ~24 FPS
      // ----------------------------------------

      if (
        timestamp -
        lastVisualUpdate <
        VISUAL_INTERVAL
      ) {
        return;
      }


      lastVisualUpdate =
        timestamp;


      // ----------------------------------------
      // INTERPOLATION PROGRESS
      // ----------------------------------------

      // 0 immediately after a history push
      // 1 just before the next history push
      const progress =
        Math.max(
          0,
          Math.min(
            1,
            (
              timestamp -
              lastHistoryUpdate
            ) /
            HISTORY_INTERVAL
          )
        );


      const width =
        canvas.width;

      const height =
        canvas.height;

      const centerY =
        height / 2;

      const dpr =
        window.devicePixelRatio || 1;


      // ----------------------------------------
      // CLEAR
      // ----------------------------------------

      ctx.fillStyle =
        "#ffffff";

      ctx.fillRect(
        0,
        0,
        width,
        height
      );


      // ----------------------------------------
      // GEOMETRY
      // ----------------------------------------

      const horizontalPadding =
        20 * dpr;


      const usableWidth =
        width -
        horizontalPadding * 2;


      const spacing =
        usableWidth /
        (BAR_COUNT - 1);


      const maxHalfHeight =
        centerY *
        MAX_HEIGHT_RATIO;


      ctx.lineCap =
        "round";


      // ========================================
      // DRAW INTERPOLATED CAPSULES
      // ========================================

      for (
        let i = 0;
        i < BAR_COUNT;
        i++
      ) {

        // Move continuously from the current
        // slot toward the next slot on the left.
        const x =
          horizontalPadding +
          (
            i - progress
          ) * spacing;


        // Skip capsules fully outside canvas
        if (
          x <
          horizontalPadding -
          spacing
        ) {
          continue;
        }


        // Interpolate amplitude too,
        // preventing sudden shape snapping.
        const currentValue =
          history[i + 1];


        const nextLeftValue =
          history[i];


        const amplitude =
          currentValue *
          (1 - progress) +
          nextLeftValue *
          progress;


        const position =
          (
            x -
            horizontalPadding
          ) /
          usableWidth;


        const halfHeight =
          Math.max(
            MIN_HEIGHT * dpr,
            amplitude *
            maxHalfHeight
          );


        const yTop =
          centerY -
          halfHeight;


        const yBottom =
          centerY +
          halfHeight;


        // --------------------------------------
        // SOFT OUTER BODY
        // --------------------------------------

        ctx.beginPath();

        ctx.strokeStyle =
          colorForPosition(
            position,
            0.18
          );

        ctx.lineWidth =
          BODY_WIDTH * dpr;

        ctx.moveTo(
          x,
          yTop
        );

        ctx.lineTo(
          x,
          yBottom
        );

        ctx.stroke();


        // --------------------------------------
        // SATURATED CORE
        // --------------------------------------

        ctx.beginPath();

        ctx.strokeStyle =
          colorForPosition(
            position,
            0.98
          );

        ctx.lineWidth =
          CORE_WIDTH * dpr;

        ctx.moveTo(
          x,
          yTop
        );

        ctx.lineTo(
          x,
          yBottom
        );

        ctx.stroke();
      }
    }
  </script>

</body>
</html>
