<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 190px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let timeData;
    let frequencyData;

    let animationId = null;
    let isDrawing = false;


    // ==========================================
    // TIMELINE
    // ==========================================

    // 100 strokes across the visualizer
    const BAR_COUNT = 100;

    // 10 new measurements per second
    // 100 bars / 10 per sec = ~10 sec visible
    const HISTORY_FPS = 10;
    const HISTORY_INTERVAL = 1000 / HISTORY_FPS;


    // ==========================================
    // VISUAL APPEARANCE
    // ==========================================

    // Thick rounded strokes
    const LINE_WIDTH = 8;

    // Minimum half-height of quiet bars
    const MIN_HEIGHT = 2;

    // Maximum vertical size
    const MAX_HEIGHT_RATIO = 0.88;

    // Overall sensitivity
    const BASE_GAIN = 2.15;

    // Lift quieter information
    const COMPRESSION = 0.62;


    // ==========================================
    // AMPLITUDE RESPONSE
    // ==========================================

    // Fast reaction to louder events
    const AMPLITUDE_ATTACK = 0.72;

    // Slower fall after event
    const AMPLITUDE_RELEASE = 0.16;


    // ==========================================
    // TRANSIENT EMPHASIS
    // ==========================================

    const TRANSIENT_STRENGTH = 4.0;

    const MAX_TRANSIENT_BOOST = 1.95;

    // Upper-mid emphasis for snares/claps
    const SNARE_STRENGTH = 2.2;


    // ==========================================
    // STATE
    // ==========================================

    const history =
      new Float32Array(BAR_COUNT);

    let lastHistoryUpdate = 0;

    let smoothedAmplitude = 0;

    let previousEnergy = 0;


    // ==========================================
    // CANVAS
    // ==========================================

    function resizeCanvas() {
      const dpr =
        window.devicePixelRatio || 1;

      canvas.width =
        Math.round(
          canvas.clientWidth * dpr
        );

      canvas.height =
        Math.round(
          canvas.clientHeight * dpr
        );
    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );


    // ==========================================
    // AUDIO INITIALIZATION
    // ==========================================

    function initializeAudio() {
      if (audioContext) return;

      audioContext =
        new AudioContext();

      analyser =
        audioContext.createAnalyser();

      analyser.fftSize = 2048;

      analyser.smoothingTimeConstant = 0.30;

      source =
        audioContext.createMediaElementSource(
          audio
        );

      source.connect(analyser);

      analyser.connect(
        audioContext.destination
      );

      timeData =
        new Uint8Array(
          analyser.fftSize
        );

      frequencyData =
        new Uint8Array(
          analyser.frequencyBinCount
        );
    }


    // ==========================================
    // PLAYBACK
    // ==========================================

    audio.addEventListener(
      "play",
      async () => {

        initializeAudio();

        if (
          audioContext.state ===
          "suspended"
        ) {
          await audioContext.resume();
        }

        if (!isDrawing) {
          isDrawing = true;

          lastHistoryUpdate = 0;

          draw(performance.now());
        }
      }
    );


    audio.addEventListener(
      "pause",
      stopDrawing
    );


    audio.addEventListener(
      "ended",
      stopDrawing
    );


    function stopDrawing() {
      isDrawing = false;

      if (animationId !== null) {
        cancelAnimationFrame(
          animationId
        );

        animationId = null;
      }
    }


    // ==========================================
    // AUDIO MEASUREMENT
    // ==========================================

    function measureAudio() {

      analyser.getByteTimeDomainData(
        timeData
      );

      analyser.getByteFrequencyData(
        frequencyData
      );


      // ----------------------------------------
      // RMS + PEAK
      // ----------------------------------------

      let sumSquares = 0;
      let peak = 0;


      for (
        let i = 0;
        i < timeData.length;
        i++
      ) {

        const sample =
          (timeData[i] - 128) / 128;

        const absSample =
          Math.abs(sample);

        sumSquares +=
          sample * sample;


        if (absSample > peak) {
          peak = absSample;
        }
      }


      const rms =
        Math.sqrt(
          sumSquares /
          timeData.length
        );


      // Hybrid loudness measurement
      let amplitude =
        rms * 0.68 +
        peak * 0.32;


      // ----------------------------------------
      // TRANSIENT DETECTION
      // ----------------------------------------

      const energyRise =
        Math.max(
          0,
          rms - previousEnergy
        );


      let transientBoost =
        1 +
        energyRise *
        TRANSIENT_STRENGTH *
        12;


      transientBoost =
        Math.min(
          MAX_TRANSIENT_BOOST,
          transientBoost
        );


      previousEnergy =
        previousEnergy * 0.80 +
        rms * 0.20;


      // ----------------------------------------
      // SNARE / UPPER-MID ENERGY
      // ----------------------------------------

      const nyquist =
        audioContext.sampleRate / 2;

      const binHz =
        nyquist /
        frequencyData.length;


      const lowBin =
        Math.floor(
          1800 / binHz
        );

      const highBin =
        Math.min(
          frequencyData.length - 1,
          Math.floor(
            6500 / binHz
          )
        );


      let snareEnergy = 0;
      let snareCount = 0;


      for (
        let i = lowBin;
        i <= highBin;
        i++
      ) {

        snareEnergy +=
          frequencyData[i] / 255;

        snareCount++;
      }


      if (snareCount > 0) {
        snareEnergy /=
          snareCount;
      }


      const snareBoost =
        1 +
        snareEnergy *
        SNARE_STRENGTH *
        0.35;


      // ----------------------------------------
      // FINAL AMPLITUDE
      // ----------------------------------------

      amplitude *=
        transientBoost *
        snareBoost *
        BASE_GAIN;


      // Soft compression
      amplitude =
        Math.pow(
          Math.min(
            amplitude,
            1
          ),
          COMPRESSION
        );


      // Attack / release
      const response =
        amplitude >
        smoothedAmplitude
          ? AMPLITUDE_ATTACK
          : AMPLITUDE_RELEASE;


      smoothedAmplitude +=
        (
          amplitude -
          smoothedAmplitude
        ) * response;


      return Math.max(
        0,
        Math.min(
          1,
          smoothedAmplitude
        )
      );
    }


    // ==========================================
    // HISTORY
    // ==========================================

    function pushHistory(value) {

      // Move older audio one position left
      for (
        let i = 0;
        i < BAR_COUNT - 1;
        i++
      ) {

        history[i] =
          history[i + 1];
      }


      // Newest audio enters on right
      history[BAR_COUNT - 1] =
        value;
    }


    // ==========================================
    // DRAW
    // ==========================================

    function draw(timestamp) {
      if (!isDrawing) return;

      animationId =
        requestAnimationFrame(draw);


      // Add one new timeline measurement
      // every 100 ms.
      if (
        timestamp -
        lastHistoryUpdate >=
        HISTORY_INTERVAL
      ) {

        const amplitude =
          measureAudio();

        pushHistory(amplitude);

        lastHistoryUpdate =
          timestamp;
      }


      const width =
        canvas.width;

      const height =
        canvas.height;

      const centerY =
        height / 2;

      const dpr =
        window.devicePixelRatio || 1;


      // White background
      ctx.fillStyle =
        "#ffffff";

      ctx.fillRect(
        0,
        0,
        width,
        height
      );


      // ========================================
      // DRAW BARS
      // ========================================

      ctx.strokeStyle =
        "#000000";

      ctx.lineWidth =
        LINE_WIDTH * dpr;

      ctx.lineCap =
        "round";


      const horizontalPadding =
        14 * dpr;


      const usableWidth =
        width -
        horizontalPadding * 2;


      const spacing =
        usableWidth /
        (BAR_COUNT - 1);


      const maxHalfHeight =
        centerY *
        MAX_HEIGHT_RATIO;


      for (
        let i = 0;
        i < BAR_COUNT;
        i++
      ) {

        const x =
          horizontalPadding +
          i * spacing;


        const amplitude =
          history[i];


        const halfHeight =
          Math.max(
            MIN_HEIGHT * dpr,
            amplitude *
            maxHalfHeight
          );


        ctx.beginPath();

        ctx.moveTo(
          x,
          centerY - halfHeight
        );

        ctx.lineTo(
          x,
          centerY + halfHeight
        );

        ctx.stroke();
      }
    }
  </script>

</body>
</html>
