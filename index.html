<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: white;
      width: 100%;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 300px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let dataArray;
    let animationId = null;
    let isDrawing = false;

    // -----------------------------
    // VISUAL TUNING
    // -----------------------------

    const LINE_WIDTH = 3.0;

    // Base waveform enlargement
    const BASE_GAIN = 1.8;

    // Soft compression:
    // lower values = stronger compression
    const COMPRESSION = 0.72;

    // Automatic gain control
    const TARGET_PEAK = 0.48;
    const MIN_AUTO_GAIN = 0.75;
    const MAX_AUTO_GAIN = 3.0;

    // Gain changes slowly so the waveform does not "pump"
    const GAIN_ATTACK = 0.025;
    const GAIN_RELEASE = 0.006;

    // Tiny signals become flat
    const NOISE_FLOOR = 0.006;

    // Vertical safety margin
    const MAX_AMPLITUDE = 0.88;

    let autoGain = 1.0;


    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = Math.round(canvas.clientWidth * dpr);
      canvas.height = Math.round(canvas.clientHeight * dpr);
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);


    function initializeAudio() {
      if (audioContext) return;

      audioContext = new AudioContext();

      analyser = audioContext.createAnalyser();

      // Larger buffer gives a smoother, more coherent waveform
      analyser.fftSize = 4096;

      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);

      dataArray = new Uint8Array(analyser.fftSize);
    }


    audio.addEventListener("play", async () => {
      initializeAudio();

      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }

      if (!isDrawing) {
        isDrawing = true;
        draw();
      }
    });


    audio.addEventListener("pause", () => {
      stopDrawing();
    });


    audio.addEventListener("ended", () => {
      stopDrawing();
    });


    function stopDrawing() {
      isDrawing = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }


    function draw() {
      if (!isDrawing) return;

      animationId = requestAnimationFrame(draw);

      analyser.getByteTimeDomainData(dataArray);

      const width = canvas.width;
      const height = canvas.height;
      const centerY = height / 2;

      // White background
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);


      // -----------------------------
      // MEASURE CURRENT SIGNAL PEAK
      // -----------------------------

      let currentPeak = 0;

      for (let i = 0; i < dataArray.length; i++) {
        const sample = Math.abs((dataArray[i] - 128) / 128);

        if (sample > currentPeak) {
          currentPeak = sample;
        }
      }


      // -----------------------------
      // AUTOMATIC GAIN CONTROL
      // -----------------------------

      let desiredGain;

      if (currentPeak > NOISE_FLOOR) {
        desiredGain = TARGET_PEAK / currentPeak;
      } else {
        desiredGain = 1;
      }

      desiredGain = Math.max(
        MIN_AUTO_GAIN,
        Math.min(MAX_AUTO_GAIN, desiredGain)
      );

      const gainSpeed =
        desiredGain < autoGain
          ? GAIN_ATTACK
          : GAIN_RELEASE;

      autoGain +=
        (desiredGain - autoGain) * gainSpeed;


      // -----------------------------
      // DRAW WAVEFORM
      // -----------------------------

      const dpr = window.devicePixelRatio || 1;

      ctx.lineWidth = LINE_WIDTH * dpr;
      ctx.strokeStyle = "#000000";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.beginPath();

      const sliceWidth =
        width / (dataArray.length - 1);

      for (let i = 0; i < dataArray.length; i++) {

        let sample =
          (dataArray[i] - 128) / 128;


        // Remove tiny near-zero movement
        if (Math.abs(sample) < NOISE_FLOOR) {
          sample = 0;
        }


        // Base enlargement + automatic gain
        sample *= BASE_GAIN * autoGain;


        // Soft compression while preserving sign
        const sign = Math.sign(sample);

        sample =
          sign *
          Math.pow(
            Math.min(Math.abs(sample), 1),
            COMPRESSION
          );


        // Prevent waveform touching canvas edges
        sample = Math.max(
          -MAX_AMPLITUDE,
          Math.min(MAX_AMPLITUDE, sample)
        );


        const x = i * sliceWidth;

        const y =
          centerY +
          sample * centerY;


        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();
    }
  </script>

</body>
</html>
