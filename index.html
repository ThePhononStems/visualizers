<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 220px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let dataArray;
    let animationId = null;
    let isDrawing = false;

    // ==========================================
    // VISUAL CHARACTER
    // ==========================================

    // Number of points actually drawn.
    // Lower = calmer / broader shapes.
    // Higher = more detailed / more frenetic.
    const DISPLAY_POINTS = 320;

    // Line appearance
    const LINE_WIDTH = 3.0;

    // Overall waveform size
    const BASE_GAIN = 1.35;

    // Soft compression.
    // Lower = stronger compression of large peaks.
    const COMPRESSION = 0.72;

    // Automatic gain target
    const TARGET_PEAK = 0.34;

    const MIN_AUTO_GAIN = 0.70;
    const MAX_AUTO_GAIN = 2.20;

    // How quickly auto gain changes
    const GAIN_ATTACK = 0.018;
    const GAIN_RELEASE = 0.003;

    // Ignore tiny signal movement
    const NOISE_FLOOR = 0.007;

    // Maximum vertical excursion
    const MAX_AMPLITUDE = 0.72;

    // Spatial smoothing:
    // higher = smoother across the width
    const SPATIAL_SMOOTHING = 2;

    // Temporal smoothing:
    // higher = calmer from frame to frame
    // 0 = no smoothing
    // 0.9 = very slow/heavy
    const TEMPORAL_SMOOTHING = 0.68;

    let autoGain = 1.0;

    let previousFrame =
      new Float32Array(DISPLAY_POINTS);


    // ==========================================
    // CANVAS
    // ==========================================

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width =
        Math.round(canvas.clientWidth * dpr);

      canvas.height =
        Math.round(canvas.clientHeight * dpr);
    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );


    // ==========================================
    // AUDIO INITIALIZATION
    // ==========================================

    function initializeAudio() {
      if (audioContext) return;

      audioContext = new AudioContext();

      analyser =
        audioContext.createAnalyser();

      // Keep original-style analysis density
      analyser.fftSize = 2048;

      source =
        audioContext.createMediaElementSource(audio);

      source.connect(analyser);

      analyser.connect(
        audioContext.destination
      );

      dataArray =
        new Uint8Array(analyser.fftSize);
    }


    // ==========================================
    // PLAYBACK EVENTS
    // ==========================================

    audio.addEventListener(
      "play",
      async () => {

        initializeAudio();

        if (
          audioContext.state === "suspended"
        ) {
          await audioContext.resume();
        }

        if (!isDrawing) {
          isDrawing = true;
          draw();
        }
      }
    );


    audio.addEventListener(
      "pause",
      stopDrawing
    );


    audio.addEventListener(
      "ended",
      stopDrawing
    );


    function stopDrawing() {
      isDrawing = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }


    // ==========================================
    // SAMPLE AUDIO INTO FEWER DISPLAY POINTS
    // ==========================================

    function createDisplayWaveform() {

      const output =
        new Float32Array(DISPLAY_POINTS);

      const samplesPerPoint =
        dataArray.length / DISPLAY_POINTS;


      for (
        let point = 0;
        point < DISPLAY_POINTS;
        point++
      ) {

        const centerIndex =
          Math.floor(
            point * samplesPerPoint
          );

        let total = 0;
        let count = 0;


        // Average nearby samples.
        // This removes frantic micro-detail.
        for (
          let offset = -SPATIAL_SMOOTHING;
          offset <= SPATIAL_SMOOTHING;
          offset++
        ) {

          const index =
            centerIndex + offset;

          if (
            index >= 0 &&
            index < dataArray.length
          ) {

            total +=
              (dataArray[index] - 128) / 128;

            count++;
          }
        }


        output[point] =
          count > 0
            ? total / count
            : 0;
      }


      return output;
    }


    // ==========================================
    // DRAW
    // ==========================================

    function draw() {
      if (!isDrawing) return;

      animationId =
        requestAnimationFrame(draw);

      analyser.getByteTimeDomainData(
        dataArray
      );


      const width = canvas.width;
      const height = canvas.height;
      const centerY = height / 2;


      // White background
      ctx.fillStyle = "#ffffff";

      ctx.fillRect(
        0,
        0,
        width,
        height
      );


      // Create calmer low-density waveform
      const currentFrame =
        createDisplayWaveform();


      // ========================================
      // TEMPORAL SMOOTHING
      // ========================================

      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        currentFrame[i] =
          previousFrame[i] *
            TEMPORAL_SMOOTHING
          +
          currentFrame[i] *
            (1 - TEMPORAL_SMOOTHING);

        previousFrame[i] =
          currentFrame[i];
      }


      // ========================================
      // MEASURE SIGNAL PEAK
      // ========================================

      let currentPeak = 0;

      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        const amplitude =
          Math.abs(currentFrame[i]);

        if (amplitude > currentPeak) {
          currentPeak = amplitude;
        }
      }


      // ========================================
      // AUTOMATIC GAIN
      // ========================================

      let desiredGain;

      if (currentPeak > NOISE_FLOOR) {
        desiredGain =
          TARGET_PEAK / currentPeak;
      } else {
        desiredGain = 1;
      }


      desiredGain = Math.max(
        MIN_AUTO_GAIN,
        Math.min(
          MAX_AUTO_GAIN,
          desiredGain
        )
      );


      const gainSpeed =
        desiredGain < autoGain
          ? GAIN_ATTACK
          : GAIN_RELEASE;


      autoGain +=
        (desiredGain - autoGain) *
        gainSpeed;


      // ========================================
      // DRAW WAVEFORM
      // ========================================

      const dpr =
        window.devicePixelRatio || 1;

      ctx.lineWidth =
        LINE_WIDTH * dpr;

      ctx.strokeStyle = "#000000";

      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.beginPath();


      const sliceWidth =
        width /
        (DISPLAY_POINTS - 1);


      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        let sample =
          currentFrame[i];


        // Remove tiny movement
        if (
          Math.abs(sample) <
          NOISE_FLOOR
        ) {
          sample = 0;
        }


        // Base gain + auto gain
        sample *=
          BASE_GAIN * autoGain;


        // Soft compression
        const sign =
          Math.sign(sample);

        sample =
          sign *
          Math.pow(
            Math.min(
              Math.abs(sample),
              1
            ),
            COMPRESSION
          );


        // Vertical safety limit
        sample = Math.max(
          -MAX_AMPLITUDE,
          Math.min(
            MAX_AMPLITUDE,
            sample
          )
        );


        const x =
          i * sliceWidth;

        const y =
          centerY +
          sample * centerY;


        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }


      ctx.stroke();
    }
  </script>

</body>
</html>
