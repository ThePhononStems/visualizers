<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>SWT Media</title>

<link
    rel="stylesheet"
    href="assets/css/index.css">

</head>

<body>

<div class="container">

    <div class="library">

        <h1>SWT Media</h1>

        <h2>Videos</h2>

        <a
            href="#"
            onclick="loadVideo('portada');return false;">

            Portada

        </a>

        <a
            href="#"
            onclick="loadVideo('palestina');return false;">

            Palestina

        </a>

    </div>

    <div class="playerArea">

        <iframe

            id="player"

            src="video.html?id=portada">

        </iframe>

    </div>

</div>

<script>

function loadVideo(id){

    document.getElementById("player").src =
        "video.html?id="+id;

}

</script>

</body>

</html>
