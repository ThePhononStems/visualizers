<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 190px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let dataArray;

    let animationId = null;
    let isDrawing = false;

    // ==========================================
    // VISUAL CHARACTER
    // ==========================================

    const DISPLAY_POINTS = 320;

    // How often a genuinely new waveform is captured.
    // Lower = calmer.
    // Higher = more immediate.
    const TARGET_FPS = 12;
    const TARGET_INTERVAL = 1000 / TARGET_FPS;

    // How quickly visible waveform moves toward target.
    // Lower = slower / calmer.
    // Higher = faster / more reactive.
    const EASING = 0.16;

    const LINE_WIDTH = 2.5;

    const BASE_GAIN = 1.20;

    const COMPRESSION = 0.72;

    const TARGET_PEAK = 0.30;

    const MIN_AUTO_GAIN = 0.70;
    const MAX_AUTO_GAIN = 2.00;

    const GAIN_ATTACK = 0.015;
    const GAIN_RELEASE = 0.0025;

    const NOISE_FLOOR = 0.007;

    const MAX_AMPLITUDE = 0.66;

    const SPATIAL_SMOOTHING = 2;

    let autoGain = 1.0;

    let lastTargetUpdate = 0;

    const targetFrame =
      new Float32Array(DISPLAY_POINTS);

    const visibleFrame =
      new Float32Array(DISPLAY_POINTS);


    // ==========================================
    // CANVAS
    // ==========================================

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width =
        Math.round(canvas.clientWidth * dpr);

      canvas.height =
        Math.round(canvas.clientHeight * dpr);
    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );


    // ==========================================
    // AUDIO
    // ==========================================

    function initializeAudio() {
      if (audioContext) return;

      audioContext = new AudioContext();

      analyser =
        audioContext.createAnalyser();

      analyser.fftSize = 2048;

      source =
        audioContext.createMediaElementSource(audio);

      source.connect(analyser);

      analyser.connect(
        audioContext.destination
      );

      dataArray =
        new Uint8Array(analyser.fftSize);
    }


    // ==========================================
    // PLAYBACK
    // ==========================================

    audio.addEventListener(
      "play",
      async () => {

        initializeAudio();

        if (
          audioContext.state === "suspended"
        ) {
          await audioContext.resume();
        }

        if (!isDrawing) {
          isDrawing = true;

          lastTargetUpdate = 0;

          draw(performance.now());
        }
      }
    );


    audio.addEventListener(
      "pause",
      stopDrawing
    );


    audio.addEventListener(
      "ended",
      stopDrawing
    );


    function stopDrawing() {
      isDrawing = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }


    // ==========================================
    // CAPTURE A NEW TARGET WAVEFORM
    // ==========================================

    function updateTargetWaveform() {

      analyser.getByteTimeDomainData(
        dataArray
      );

      const samplesPerPoint =
        dataArray.length / DISPLAY_POINTS;


      for (
        let point = 0;
        point < DISPLAY_POINTS;
        point++
      ) {

        const centerIndex =
          Math.floor(
            point * samplesPerPoint
          );

        let total = 0;
        let count = 0;


        for (
          let offset = -SPATIAL_SMOOTHING;
          offset <= SPATIAL_SMOOTHING;
          offset++
        ) {

          const index =
            centerIndex + offset;

          if (
            index >= 0 &&
            index < dataArray.length
          ) {

            total +=
              (dataArray[index] - 128) / 128;

            count++;
          }
        }


        targetFrame[point] =
          count > 0
            ? total / count
            : 0;
      }


      updateAutoGain();
    }


    // ==========================================
    // AUTOMATIC GAIN
    // ==========================================

    function updateAutoGain() {

      let currentPeak = 0;


      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        const amplitude =
          Math.abs(targetFrame[i]);

        if (amplitude > currentPeak) {
          currentPeak = amplitude;
        }
      }


      let desiredGain;

      if (currentPeak > NOISE_FLOOR) {
        desiredGain =
          TARGET_PEAK / currentPeak;
      } else {
        desiredGain = 1;
      }


      desiredGain = Math.max(
        MIN_AUTO_GAIN,
        Math.min(
          MAX_AUTO_GAIN,
          desiredGain
        )
      );


      const gainSpeed =
        desiredGain < autoGain
          ? GAIN_ATTACK
          : GAIN_RELEASE;


      autoGain +=
        (desiredGain - autoGain) *
        gainSpeed;
    }


    // ==========================================
    // DRAW
    // ==========================================

    function draw(timestamp) {
      if (!isDrawing) return;

      animationId =
        requestAnimationFrame(draw);


      // Only capture a genuinely new waveform
      // 12 times per second.
      if (
        timestamp - lastTargetUpdate
        >= TARGET_INTERVAL
      ) {

        updateTargetWaveform();

        lastTargetUpdate = timestamp;
      }


      // Smoothly move visible line
      // toward the newest target.
      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        visibleFrame[i] +=
          (
            targetFrame[i] -
            visibleFrame[i]
          ) * EASING;
      }


      const width = canvas.width;
      const height = canvas.height;
      const centerY = height / 2;


      // White background
      ctx.fillStyle = "#ffffff";

      ctx.fillRect(
        0,
        0,
        width,
        height
      );


      // ========================================
      // DRAW LINE
      // ========================================

      const dpr =
        window.devicePixelRatio || 1;

      ctx.lineWidth =
        LINE_WIDTH * dpr;

      ctx.strokeStyle = "#000000";

      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.beginPath();


      const sliceWidth =
        width /
        (DISPLAY_POINTS - 1);


      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        let sample =
          visibleFrame[i];


        // Remove tiny movement
        if (
          Math.abs(sample) <
          NOISE_FLOOR
        ) {
          sample = 0;
        }


        // Gain
        sample *=
          BASE_GAIN * autoGain;


        // Soft compression
        const sign =
          Math.sign(sample);

        sample =
          sign *
          Math.pow(
            Math.min(
              Math.abs(sample),
              1
            ),
            COMPRESSION
          );


        // Vertical limit
        sample = Math.max(
          -MAX_AMPLITUDE,
          Math.min(
            MAX_AMPLITUDE,
            sample
          )
        );


        const x =
          i * sliceWidth;

        const y =
          centerY +
          sample * centerY;


        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }


      ctx.stroke();
    }
  </script>

</body>
</html>
