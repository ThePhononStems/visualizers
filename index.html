<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 220px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio =
      document.getElementById("audio");

    const canvas =
      document.getElementById("visualizer");

    const ctx =
      canvas.getContext("2d");


    let audioContext;
    let analyser;
    let source;

    let timeData;
    let frequencyData;

    let animationId = null;
    let isDrawing = false;


    // ==========================================
    // TIMELINE
    // ==========================================

    // Number of visible capsules
    const BAR_COUNT = 64;

    // 8 new measurements per second.
    // 64 / 8 = about 8 seconds visible.
    const HISTORY_FPS = 8;

    const HISTORY_INTERVAL =
      1000 / HISTORY_FPS;


    // ==========================================
    // VISUAL APPEARANCE
    // ==========================================

    // Crisp central capsule
    const CORE_WIDTH = 7;

    // Broad translucent body underneath
    const BODY_WIDTH = 15;

    // Quiet sounds become small dots/capsules
    const MIN_HEIGHT = 2.5;

    // Maximum half-height
    const MAX_HEIGHT_RATIO = 0.84;

    // Overall sensitivity
    const BASE_GAIN = 2.35;

    // Lower values lift quieter detail
    const COMPRESSION = 0.58;


    // ==========================================
    // RESPONSE
    // ==========================================

    // Fast rise on hits
    const ATTACK = 0.82;

    // Controlled decay
    const RELEASE = 0.24;


    // ==========================================
    // TRANSIENT EMPHASIS
    // ==========================================

    const TRANSIENT_STRENGTH = 4.8;

    const MAX_TRANSIENT_BOOST = 2.15;

    // Upper-mid emphasis
    const SNARE_STRENGTH = 2.6;


    // ==========================================
    // HISTORY STATE
    // ==========================================

    const history =
      new Float32Array(BAR_COUNT);

    let lastHistoryUpdate = 0;

    let smoothedAmplitude = 0;

    let previousEnergy = 0;


    // ==========================================
    // CANVAS
    // ==========================================

    function resizeCanvas() {

      const dpr =
        window.devicePixelRatio || 1;

      canvas.width =
        Math.round(
          canvas.clientWidth * dpr
        );

      canvas.height =
        Math.round(
          canvas.clientHeight * dpr
        );
    }


    resizeCanvas();


    window.addEventListener(
      "resize",
      resizeCanvas
    );


    // ==========================================
    // AUDIO INITIALIZATION
    // ==========================================

    function initializeAudio() {

      if (audioContext) return;


      audioContext =
        new AudioContext();


      analyser =
        audioContext.createAnalyser();


      analyser.fftSize = 2048;

      analyser.smoothingTimeConstant =
        0.25;


      source =
        audioContext.createMediaElementSource(
          audio
        );


      source.connect(analyser);

      analyser.connect(
        audioContext.destination
      );


      timeData =
        new Uint8Array(
          analyser.fftSize
        );


      frequencyData =
        new Uint8Array(
          analyser.frequencyBinCount
        );
    }


    // ==========================================
    // PLAYBACK
    // ==========================================

    audio.addEventListener(
      "play",
      async () => {

        initializeAudio();


        if (
          audioContext.state ===
          "suspended"
        ) {
          await audioContext.resume();
        }


        if (!isDrawing) {

          isDrawing = true;

          lastHistoryUpdate = 0;

          draw(performance.now());
        }
      }
    );


    audio.addEventListener(
      "pause",
      stopDrawing
    );


    audio.addEventListener(
      "ended",
      stopDrawing
    );


    function stopDrawing() {

      isDrawing = false;


      if (animationId !== null) {

        cancelAnimationFrame(
          animationId
        );

        animationId = null;
      }
    }


    // ==========================================
    // COLOR
    // ==========================================

    function colorForPosition(
      position,
      alpha = 1
    ) {

      // position = 0 at left
      // position = 1 at right

      let r;
      let g;
      let b;


      if (position < 0.33) {

        // Cyan -> blue

        const t =
          position / 0.33;

        r =
          0 + (45 * t);

        g =
          220 - (110 * t);

        b = 255;

      } else if (position < 0.66) {

        // Blue -> violet

        const t =
          (position - 0.33) / 0.33;

        r =
          45 + (115 * t);

        g =
          110 - (55 * t);

        b = 255;

      } else {

        // Violet -> magenta

        const t =
          (position - 0.66) / 0.34;

        r =
          160 + (95 * t);

        g =
          55 - (35 * t);

        b =
          255 - (35 * t);
      }


      return (
        "rgba(" +
        Math.round(r) + "," +
        Math.round(g) + "," +
        Math.round(b) + "," +
        alpha +
        ")"
      );
    }


    // ==========================================
    // AUDIO MEASUREMENT
    // ==========================================

    function measureAudio() {

      analyser.getByteTimeDomainData(
        timeData
      );


      analyser.getByteFrequencyData(
        frequencyData
      );


      // ----------------------------------------
      // RMS + PEAK
      // ----------------------------------------

      let sumSquares = 0;

      let peak = 0;


      for (
        let i = 0;
        i < timeData.length;
        i++
      ) {

        const sample =
          (timeData[i] - 128) / 128;


        const absSample =
          Math.abs(sample);


        sumSquares +=
          sample * sample;


        if (absSample > peak) {
          peak = absSample;
        }
      }


      const rms =
        Math.sqrt(
          sumSquares /
          timeData.length
        );


      // Hybrid energy measurement
      let amplitude =
        rms * 0.62 +
        peak * 0.38;


      // ----------------------------------------
      // TRANSIENT DETECTION
      // ----------------------------------------

      const energyRise =
        Math.max(
          0,
          rms - previousEnergy
        );


      let transientBoost =
        1 +
        energyRise *
        TRANSIENT_STRENGTH *
        12;


      transientBoost =
        Math.min(
          MAX_TRANSIENT_BOOST,
          transientBoost
        );


      previousEnergy =
        previousEnergy * 0.82 +
        rms * 0.18;


      // ----------------------------------------
      // UPPER-MID / SNARE ENERGY
      // ----------------------------------------

      const nyquist =
        audioContext.sampleRate / 2;


      const binHz =
        nyquist /
        frequencyData.length;


      const lowBin =
        Math.floor(
          1700 / binHz
        );


      const highBin =
        Math.min(
          frequencyData.length - 1,
          Math.floor(
            7000 / binHz
          )
        );


      let snareEnergy = 0;

      let snareCount = 0;


      for (
        let i = lowBin;
        i <= highBin;
        i++
      ) {

        snareEnergy +=
          frequencyData[i] / 255;

        snareCount++;
      }


      if (snareCount > 0) {

        snareEnergy /=
          snareCount;
      }


      const snareBoost =
        1 +
        snareEnergy *
        SNARE_STRENGTH *
        0.42;


      // ----------------------------------------
      // FINAL ENERGY
      // ----------------------------------------

      amplitude *=
        transientBoost *
        snareBoost *
        BASE_GAIN;


      // Compression
      amplitude =
        Math.pow(
          Math.min(
            amplitude,
            1
          ),
          COMPRESSION
        );


      // Attack / release
      const response =
        amplitude > smoothedAmplitude
          ? ATTACK
          : RELEASE;


      smoothedAmplitude +=
        (
          amplitude -
          smoothedAmplitude
        ) * response;


      return Math.max(
        0,
        Math.min(
          1,
          smoothedAmplitude
        )
      );
    }


    // ==========================================
    // HISTORY
    // ==========================================

    function pushHistory(value) {

      for (
        let i = 0;
        i < BAR_COUNT - 1;
        i++
      ) {

        history[i] =
          history[i + 1];
      }


      // Newest sound enters at right
      history[BAR_COUNT - 1] =
        value;
    }


    // ==========================================
    // DRAW
    // ==========================================

    function draw(timestamp) {

      if (!isDrawing) return;


      animationId =
        requestAnimationFrame(draw);


      // Add new musical measurement
      if (
        timestamp -
        lastHistoryUpdate >=
        HISTORY_INTERVAL
      ) {

        const amplitude =
          measureAudio();


        pushHistory(amplitude);


        lastHistoryUpdate =
          timestamp;
      }


      const width =
        canvas.width;


      const height =
        canvas.height;


      const centerY =
        height / 2;


      const dpr =
        window.devicePixelRatio || 1;


      // White background
      ctx.fillStyle =
        "#ffffff";


      ctx.fillRect(
        0,
        0,
        width,
        height
      );


      // ========================================
      // GEOMETRY
      // ========================================

      const horizontalPadding =
        18 * dpr;


      const usableWidth =
        width -
        horizontalPadding * 2;


      const spacing =
        usableWidth /
        (BAR_COUNT - 1);


      const maxHalfHeight =
        centerY *
        MAX_HEIGHT_RATIO;


      // ========================================
      // DRAW CAPSULES
      // ========================================

      ctx.lineCap = "round";


      for (
        let i = 0;
        i < BAR_COUNT;
        i++
      ) {

        const position =
          i / (BAR_COUNT - 1);


        const x =
          horizontalPadding +
          i * spacing;


        const amplitude =
          history[i];


        const halfHeight =
          Math.max(
            MIN_HEIGHT * dpr,
            amplitude *
            maxHalfHeight
          );


        const yTop =
          centerY - halfHeight;


        const yBottom =
          centerY + halfHeight;


        // --------------------------------------
        // OUTER BODY
        // --------------------------------------

        ctx.beginPath();


        ctx.strokeStyle =
          colorForPosition(
            position,
            0.20
          );


        ctx.lineWidth =
          BODY_WIDTH * dpr;


        ctx.moveTo(
          x,
          yTop
        );


        ctx.lineTo(
          x,
          yBottom
        );


        ctx.stroke();


        // --------------------------------------
        // SATURATED CORE
        // --------------------------------------

        ctx.beginPath();


        ctx.strokeStyle =
          colorForPosition(
            position,
            0.96
          );


        ctx.lineWidth =
          CORE_WIDTH * dpr;


        ctx.moveTo(
          x,
          yTop
        );


        ctx.lineTo(
          x,
          yBottom
        );


        ctx.stroke();
      }
    }
  </script>

</body>
</html>
