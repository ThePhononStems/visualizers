<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SWT Media</title>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    display:flex;
    width:100%;
    height:100vh;
}

.library{
    width:30%;
    min-width:260px;
    background:#1b1b1b;
    overflow-y:auto;
    padding:30px;
}

.library h1{
    margin-top:0;
    font-size:28px;
}

.library a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 0;
    border-bottom:1px solid #333;
    transition:.2s;
}

.library a:hover{
    color:#5ec8ff;
}

.playerArea{
    width:70%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

iframe{
    width:90%;
    aspect-ratio:16/9;
    border:none;
    background:black;
}

</style>

</head>

<body>

<div class="container">

    <div class="library">

        <h1>SWT Media</h1>

        <h2>Videos</h2>

        <a href="#" onclick="loadVideo('portada');return false;">
            Portada
        </a>

        <a href="#" onclick="loadVideo('palestina');return false;">
            Palestina
        </a>

    </div>

    <div class="playerArea">

        <iframe
            id="player"
            src="video.html?id=portada">
        </iframe>

    </div>

</div>

<script>

function loadVideo(id){

    document.getElementById("player").src =
        "video.html?id="+id;

}

</script>

</body>
</html>
