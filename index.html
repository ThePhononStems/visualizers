<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Visualizer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: white;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 190px;
      background: white;
    }

    audio {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>

  <canvas id="visualizer"></canvas>

  <audio id="audio" controls>
    <source
      src="2005%20FAMILIARITY1_eq082514-edit101819audbb.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioContext;
    let analyser;
    let source;
    let dataArray;

    let animationId = null;
    let isDrawing = false;


    // ==========================================
    // VISUAL CHARACTER
    // ==========================================

    const DISPLAY_POINTS = 320;

    // New waveform target captures per second
    const TARGET_FPS = 12;
    const TARGET_INTERVAL = 1000 / TARGET_FPS;

    // Visible line eases toward each target
    const EASING = 0.14;

    // Thicker line
    const LINE_WIDTH = 4.0;

    // Overall amplitude
    const BASE_GAIN = 1.10;

    // Shape compression
    const COMPRESSION = 0.74;

    // Automatic gain
    const TARGET_PEAK = 0.28;
    const MIN_AUTO_GAIN = 0.70;
    const MAX_AUTO_GAIN = 1.90;

    const GAIN_ATTACK = 0.015;
    const GAIN_RELEASE = 0.0025;

    const NOISE_FLOOR = 0.006;

    const MAX_AMPLITUDE = 0.68;


    // ==========================================
    // TRANSIENT EMPHASIS
    // ==========================================

    // How strongly sudden energy increases
    // affect waveform size.
    const TRANSIENT_STRENGTH = 2.4;

    // Maximum temporary transient boost.
    const MAX_TRANSIENT_BOOST = 1.65;

    // How quickly hit emphasis disappears.
    // Lower = longer visible hit.
    const TRANSIENT_DECAY = 0.88;

    let previousEnergy = 0;
    let transientBoost = 1.0;


    // ==========================================
    // STATE
    // ==========================================

    let autoGain = 1.0;
    let lastTargetUpdate = 0;

    const targetFrame =
      new Float32Array(DISPLAY_POINTS);

    const visibleFrame =
      new Float32Array(DISPLAY_POINTS);


    // ==========================================
    // CANVAS
    // ==========================================

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width =
        Math.round(canvas.clientWidth * dpr);

      canvas.height =
        Math.round(canvas.clientHeight * dpr);
    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );


    // ==========================================
    // AUDIO INITIALIZATION
    // ==========================================

    function initializeAudio() {
      if (audioContext) return;

      audioContext = new AudioContext();

      analyser =
        audioContext.createAnalyser();

      // About 4x more timeline than 2048.
      // Roughly 170–186 ms at common sample rates.
      analyser.fftSize = 8192;

      source =
        audioContext.createMediaElementSource(audio);

      source.connect(analyser);

      analyser.connect(
        audioContext.destination
      );

      dataArray =
        new Uint8Array(analyser.fftSize);
    }


    // ==========================================
    // PLAYBACK
    // ==========================================

    audio.addEventListener(
      "play",
      async () => {

        initializeAudio();

        if (
          audioContext.state === "suspended"
        ) {
          await audioContext.resume();
        }

        if (!isDrawing) {
          isDrawing = true;
          lastTargetUpdate = 0;
          draw(performance.now());
        }
      }
    );


    audio.addEventListener(
      "pause",
      stopDrawing
    );


    audio.addEventListener(
      "ended",
      stopDrawing
    );


    function stopDrawing() {
      isDrawing = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }


    // ==========================================
    // CAPTURE WIDER TIME WINDOW
    // ==========================================

    function updateTargetWaveform() {

      analyser.getByteTimeDomainData(
        dataArray
      );

      const samplesPerPoint =
        dataArray.length / DISPLAY_POINTS;


      // ----------------------------------------
      // MEASURE CURRENT RMS ENERGY
      // ----------------------------------------

      let energySum = 0;

      for (
        let i = 0;
        i < dataArray.length;
        i++
      ) {
        const sample =
          (dataArray[i] - 128) / 128;

        energySum += sample * sample;
      }

      const currentEnergy =
        Math.sqrt(
          energySum / dataArray.length
        );


      // ----------------------------------------
      // DETECT SUDDEN ENERGY INCREASE
      // ----------------------------------------

      const energyRise =
        Math.max(
          0,
          currentEnergy - previousEnergy
        );

      const detectedBoost =
        1 +
        energyRise *
        TRANSIENT_STRENGTH *
        10;


      if (detectedBoost > transientBoost) {
        transientBoost =
          Math.min(
            MAX_TRANSIENT_BOOST,
            detectedBoost
          );
      }


      previousEnergy =
        previousEnergy * 0.72 +
        currentEnergy * 0.28;


      // ----------------------------------------
      // REDUCE 8192 SAMPLES TO 320 POINTS
      // ----------------------------------------

      for (
        let point = 0;
        point < DISPLAY_POINTS;
        point++
      ) {

        const startIndex =
          Math.floor(
            point * samplesPerPoint
          );

        const endIndex =
          Math.min(
            dataArray.length,
            Math.floor(
              (point + 1) * samplesPerPoint
            )
          );


        let sum = 0;
        let count = 0;


        for (
          let i = startIndex;
          i < endIndex;
          i++
        ) {
          sum +=
            (dataArray[i] - 128) / 128;

          count++;
        }


        targetFrame[point] =
          count > 0
            ? sum / count
            : 0;
      }


      updateAutoGain();
    }


    // ==========================================
    // AUTOMATIC GAIN
    // ==========================================

    function updateAutoGain() {

      let currentPeak = 0;


      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {
        const amplitude =
          Math.abs(targetFrame[i]);

        if (amplitude > currentPeak) {
          currentPeak = amplitude;
        }
      }


      let desiredGain;

      if (currentPeak > NOISE_FLOOR) {
        desiredGain =
          TARGET_PEAK / currentPeak;
      } else {
        desiredGain = 1;
      }


      desiredGain = Math.max(
        MIN_AUTO_GAIN,
        Math.min(
          MAX_AUTO_GAIN,
          desiredGain
        )
      );


      const gainSpeed =
        desiredGain < autoGain
          ? GAIN_ATTACK
          : GAIN_RELEASE;


      autoGain +=
        (desiredGain - autoGain) *
        gainSpeed;
    }


    // ==========================================
    // DRAW
    // ==========================================

    function draw(timestamp) {
      if (!isDrawing) return;

      animationId =
        requestAnimationFrame(draw);


      // Capture a genuinely new target
      // only 12 times per second.
      if (
        timestamp - lastTargetUpdate
        >= TARGET_INTERVAL
      ) {
        updateTargetWaveform();
        lastTargetUpdate = timestamp;
      }


      // Ease visible waveform toward target.
      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {
        visibleFrame[i] +=
          (
            targetFrame[i] -
            visibleFrame[i]
          ) * EASING;
      }


      // Let transient emphasis decay smoothly.
      transientBoost =
        1 +
        (transientBoost - 1) *
        TRANSIENT_DECAY;


      const width = canvas.width;
      const height = canvas.height;
      const centerY = height / 2;


      ctx.fillStyle = "#ffffff";

      ctx.fillRect(
        0,
        0,
        width,
        height
      );


      // ========================================
      // DRAW LINE
      // ========================================

      const dpr =
        window.devicePixelRatio || 1;

      ctx.lineWidth =
        LINE_WIDTH * dpr;

      ctx.strokeStyle = "#000000";

      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.beginPath();


      const sliceWidth =
        width /
        (DISPLAY_POINTS - 1);


      for (
        let i = 0;
        i < DISPLAY_POINTS;
        i++
      ) {

        let sample =
          visibleFrame[i];


        if (
          Math.abs(sample) <
          NOISE_FLOOR
        ) {
          sample = 0;
        }


        // Normal gain plus temporary
        // emphasis for sudden hits.
        sample *=
          BASE_GAIN *
          autoGain *
          transientBoost;


        // Soft compression
        const sign =
          Math.sign(sample);

        sample =
          sign *
          Math.pow(
            Math.min(
              Math.abs(sample),
              1
            ),
            COMPRESSION
          );


        // Vertical safety limit
        sample = Math.max(
          -MAX_AMPLITUDE,
          Math.min(
            MAX_AMPLITUDE,
            sample
          )
        );


        const x =
          i * sliceWidth;

        const y =
          centerY +
          sample * centerY;


        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }


      ctx.stroke();
    }
  </script>

</body>
</html>
