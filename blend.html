<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blend Projector</title>
<style>
*{
  box-sizing:border-box;
}
html,
body{
  margin:0;
  width:100%;
  height:100%;
  background:#111;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

/* ============================================================
   The two photo sequences are no longer listed in this file.
   Add or remove photos by editing:
     photos/list.txt   (one filename per line, Layer A)
     photosB/list.txt  (one filename per line, Layer B)
   Blank lines and lines starting with # are ignored.
   ============================================================ */
</style>
</head>
<body>

<div class="wrap">
  <div class="stage" id="stage">
    <div class="stageInner" id="stageInner">
      <div class="layer" id="layerA">
        <img class="sub" id="imgA">
      </div>
      <div class="layer" id="layerB">
        <img class="sub" id="imgB">
      </div>
    </div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="controls">
    <label class="ctrlLabel" for="blendSelect">Blend mode</label>
    <select id="blendSelect">
      <option value="multiply" selected>Multiply</option>
      <option value="vivid-light">Vivid light (approx.)</option>
      <option value="color-dodge">Color dodge</option>
      <option value="color-burn">Color burn</option>
      <option value="exclusion">Exclusion</option>
      <option value="difference">Difference</option>
      <option value="hard-light">Hard light</option>
      <option value="screen">Screen</option>
    </select>
    <label class="ctrlLabel toggleLabel">
      <input type="checkbox" id="blendCycleToggle">
      Cycle blend modes (7s)
    </label>
    <label class="ctrlLabel toggleLabel">
      <input type="checkbox" id="autoBalance" checked>
      Auto-balance exposure
    </label>
    <label class="ctrlLabel toggleLabel">
      <input type="checkbox" id="compareToggle">
      Pause and compare
    </label>
    <span class="hint" id="compareButtons" style="display:none;">
      <button id="preBtn" class="btn btnSmall">Pre-balance</button>
      <button id="postBtn" class="btn btnSmall">Post-balance</button>
    </span>
    <label class="ctrlLabel toggleLabel">
      <input type="checkbox" id="cropToggle">
      Crop to fill (square)
    </label>
    <label class="ctrlLabel toggleLabel">
      <input type="checkbox" id="fullResToggle">
      Full-resolution captures
    </label>
    <span class="hint">Press <kbd>I</kbd> to capture this pairing</span>
    <span class="hint" id="captureCount">0 captured</span>
    <button id="downloadBtn" class="btn">Download captures</button>
    <button id="clearBtn" class="btn">Clear</button>
  </div>

  <div class="log" id="log"></div>
</div>

<style>
.wrap{
  max-width:800px;
  margin:0 auto;
  padding:40px 20px;
}
.stage{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  background:#000;
  border-radius:12px;
  overflow:hidden;
}
.stageInner{
  position:absolute;
  inset:0;
  transition:filter 1s ease;
}
.layer{
  position:absolute;
  inset:0;
}
.sub{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}
.sub.cropFill{
  object-fit:cover;
}
.flash{
  position:absolute;
  inset:0;
  background:#5ec8ff;
  opacity:0;
  pointer-events:none;
  transition:opacity .08s ease;
}
.flash.on{
  opacity:0.35;
  transition:opacity 0s;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:12px;
  margin-top:20px;
}
.ctrlLabel{
  font-size:13px;
  color:#9a9a9a;
}
select{
  background:#242424;
  color:#fff;
  border:1px solid #2a2a2a;
  border-radius:8px;
  padding:8px 10px;
  font-size:14px;
}
.toggleLabel{
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
}
.hint{
  font-size:12px;
  color:#8a8a8a;
}
kbd{
  background:#242424;
  border:1px solid #2a2a2a;
  border-radius:4px;
  padding:1px 6px;
  font-family:inherit;
}
.btn{
  background:#242424;
  color:#fff;
  border:1px solid #2a2a2a;
  border-radius:8px;
  padding:8px 14px;
  font-size:13px;
  cursor:pointer;
}
.btn:hover{
  background:#303030;
  border-color:#5ec8ff;
  color:#5ec8ff;
}
.btnSmall{
  padding:6px 10px;
  font-size:12px;
}
select:disabled{
  opacity:0.5;
}

.log{
  margin-top:20px;
  max-height:200px;
  overflow-y:auto;
  font-size:12px;
  color:#9a9a9a;
}
.log div{
  padding:6px 0;
  border-bottom:1px solid #1e1e1e;
}
</style>

<script>
const MANIFEST_A = "photos/list.txt";
const MANIFEST_B = "photosB/list.txt";
const FOLDER_A = "photos/";
const FOLDER_B = "photosB/";

const INTERVAL_MS = 2000;
const BLEND_CYCLE_MODES = ["multiply", "vivid-light", "color-dodge", "exclusion", "difference", "hard-light", "screen"];
const BLEND_CYCLE_STEP_MS = 2000;

const stage = document.getElementById("stage");
const stageInner = document.getElementById("stageInner");
const layerB = document.getElementById("layerB");
const blendSelect = document.getElementById("blendSelect");
const blendCycleToggle = document.getElementById("blendCycleToggle");
const autoBalance = document.getElementById("autoBalance");
const compareToggle = document.getElementById("compareToggle");
const compareButtons = document.getElementById("compareButtons");
const preBtn = document.getElementById("preBtn");
const postBtn = document.getElementById("postBtn");
const fullResToggle = document.getElementById("fullResToggle");
const cropToggle = document.getElementById("cropToggle");
const imgAEl = document.getElementById("imgA");
const imgBEl = document.getElementById("imgB");

cropToggle.addEventListener("change", function(){
  imgAEl.classList.toggle("cropFill", cropToggle.checked);
  imgBEl.classList.toggle("cropFill", cropToggle.checked);
});
const flash = document.getElementById("flash");
const logEl = document.getElementById("log");
const captureCountEl = document.getElementById("captureCount");

let currentBlendValue = blendSelect.value;

function setBlendMode(value){
  currentBlendValue = value;
  blendSelect.value = value;
  layerB.style.mixBlendMode = value === "vivid-light" ? "hard-light" : value;
}
setBlendMode(currentBlendValue);

async function loadManifest(path, folder){
  const res = await fetch(path);
  if (!res.ok) {
    throw new Error("Could not load " + path);
  }
  const text = await res.text();
  return text.split("\n")
    .map(function(line){ return line.trim(); })
    .filter(function(line){ return line.length > 0 && line[0] !== "#"; })
    .map(function(name){ return folder + name; });
}

function makeCycler(id, list){
  const el = document.getElementById(id);
  let index = 0;
  let current = list[0];

  el.src = list[0];

  function advance(){
    index = (index + 1) % list.length;
    current = list[index];
    el.src = current;
  }

  return { advance: advance, getCurrent: function(){ return current; } };
}

let getCurrentA = function(){ return ""; };
let getCurrentB = function(){ return ""; };
let cyclerA = null;
let cyclerB = null;

let mode = "normal";
let paused = false;
let mainTimerId = null;
let blendCycleIndex = 0;

function stopTimer(){
  clearInterval(mainTimerId);
  mainTimerId = null;
}

function startNormalMode(){
  stopTimer();
  if (paused || !cyclerA) return;
  mainTimerId = setInterval(function(){
    cyclerA.advance();
    cyclerB.advance();
    scheduleAnalysis();
  }, INTERVAL_MS);
}

function startBlendCycleMode(){
  stopTimer();
  if (paused || !cyclerA) return;
  blendCycleIndex = 0;
  setBlendMode(BLEND_CYCLE_MODES[blendCycleIndex]);
  scheduleAnalysis();
  mainTimerId = setInterval(function(){
    blendCycleIndex++;
    if (blendCycleIndex >= BLEND_CYCLE_MODES.length) {
      blendCycleIndex = 0;
      cyclerA.advance();
      cyclerB.advance();
    }
    setBlendMode(BLEND_CYCLE_MODES[blendCycleIndex]);
    scheduleAnalysis();
  }, BLEND_CYCLE_STEP_MS);
}

function startCurrentMode(){
  if (mode === "blendcycle") {
    startBlendCycleMode();
  } else {
    startNormalMode();
  }
}

blendSelect.addEventListener("change", function(){
  setBlendMode(blendSelect.value);
  scheduleAnalysis();
});

blendCycleToggle.addEventListener("change", function(){
  if (blendCycleToggle.checked) {
    mode = "blendcycle";
    blendSelect.disabled = true;
  } else {
    mode = "normal";
    blendSelect.disabled = false;
    setBlendMode(blendSelect.value);
  }
  startCurrentMode();
});

compareToggle.addEventListener("change", function(){
  paused = compareToggle.checked;
  if (paused) {
    stopTimer();
    compareButtons.style.display = "inline-flex";
    stageInner.style.filter = "none";
  } else {
    compareButtons.style.display = "none";
    startCurrentMode();
    scheduleAnalysisNow();
  }
});

preBtn.addEventListener("click", function(){
  stageInner.style.filter = "none";
});
postBtn.addEventListener("click", function(){
  scheduleAnalysisNow();
});

Promise.all([
  loadManifest(MANIFEST_A, FOLDER_A),
  loadManifest(MANIFEST_B, FOLDER_B)
]).then(function(results){
  const listA = results[0];
  const listB = results[1];
  if (listA.length === 0 || listB.length === 0) {
    stage.innerHTML = '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center; color:#9a9a9a; font-size:13px;">One of the manifest files is empty. Add filenames to photos/list.txt and photosB/list.txt.</div>';
    return;
  }
  cyclerA = makeCycler("imgA", listA);
  cyclerB = makeCycler("imgB", listB);
  getCurrentA = cyclerA.getCurrent;
  getCurrentB = cyclerB.getCurrent;
  startCurrentMode();
  scheduleAnalysis();
}).catch(function(err){
  stage.innerHTML = '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center; color:#9a9a9a; font-size:13px;">Could not load the photo lists. This page needs to run over http/https (Live Server or your live site) — opening it directly as a file:// path will not work.</div>';
});

const STORAGE_KEY = "blendCaptures";
let captures = [];
try {
  captures = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
} catch (e) {
  captures = [];
}

const analysisCanvas = document.createElement("canvas");
analysisCanvas.width = 40;
analysisCanvas.height = 40;
const actx = analysisCanvas.getContext("2d", { willReadFrequently: true });

let analysisTimer = null;
function scheduleAnalysis(){
  if (!autoBalance.checked) return;
  clearTimeout(analysisTimer);
  analysisTimer = setTimeout(analyzeAndCorrect, 150);
}
function scheduleAnalysisNow(){
  clearTimeout(analysisTimer);
  analyzeAndCorrect();
}

function canvasBlendName(v){
  return v === "vivid-light" ? "hard-light" : v;
}

function analyzeAndCorrect(){
  const urlA = getCurrentA();
  const urlB = getCurrentB();
  if (!urlA || !urlB) return;

  const imgA = new Image();
  const imgB = new Image();
  let loaded = 0;

  function onBothLoaded(){
    actx.clearRect(0, 0, 40, 40);
    actx.globalCompositeOperation = "source-over";
    actx.drawImage(imgA, 0, 0, 40, 40);
    actx.globalCompositeOperation = canvasBlendName(currentBlendValue);
    actx.drawImage(imgB, 0, 0, 40, 40);
    actx.globalCompositeOperation = "source-over";

    let data;
    try {
      data = actx.getImageData(0, 0, 40, 40).data;
    } catch (e) {
      return;
    }

    let sum = 0;
    let sumSq = 0;
    let n = 0;
    for (let i = 0; i < data.length; i += 4) {
      const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      sum += lum;
      sumSq += lum * lum;
      n++;
    }
    const mean = sum / n;
    const variance = Math.max(sumSq / n - mean * mean, 0);
    const std = Math.sqrt(variance);

    applyCorrection(mean, std);
  }

  imgA.onload = function(){ loaded++; if (loaded === 2) onBothLoaded(); };
  imgB.onload = function(){ loaded++; if (loaded === 2) onBothLoaded(); };
  imgA.src = urlA;
  imgB.src = urlB;
}

function applyCorrection(mean, std){
  const lowBand = 95;
  const highBand = 160;

  let brightness = 1;
  if (mean < lowBand) {
    brightness = Math.min(2.2, lowBand / Math.max(mean, 8));
  } else if (mean > highBand) {
    brightness = Math.max(0.45, highBand / Math.min(mean, 247));
  }

  let contrast = 1;
  if (std < 28) {
    contrast = 1 + ((28 - std) / 28) * 0.6;
  }

  stageInner.style.filter = "brightness(" + brightness.toFixed(2) + ") contrast(" + contrast.toFixed(2) + ")";
}

function renderLog(){
  captureCountEl.textContent = captures.length + " captured";
  logEl.innerHTML = captures.slice().reverse().map(function(c){
    return '<div>' + c.a + '  +  ' + c.b + '  (' + c.blend + ')</div>';
  }).join("");
}
renderLog();

function capture(){
  const entry = {
    a: getCurrentA(),
    b: getCurrentB(),
    blend: currentBlendValue,
    time: new Date().toISOString()
  };
  captures.push(entry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(captures));
  renderLog();
  downloadCaptureImage(entry);

  flash.classList.add("on");
  setTimeout(function(){ flash.classList.remove("on"); }, 80);
}

function drawCover(ctx, img, w, h){
  const iw = img.naturalWidth;
  const ih = img.naturalHeight;
  const canvasRatio = w / h;
  const imgRatio = iw / ih;
  let sx, sy, sw, sh;
  if (imgRatio > canvasRatio) {
    sh = ih;
    sw = ih * canvasRatio;
    sx = (iw - sw) / 2;
    sy = 0;
  } else {
    sw = iw;
    sh = iw / canvasRatio;
    sx = 0;
    sy = (ih - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
}

function drawCenteredNative(ctx, img, canvasW, canvasH){
  const x = (canvasW - img.naturalWidth) / 2;
  const y = (canvasH - img.naturalHeight) / 2;
  ctx.drawImage(img, x, y, img.naturalWidth, img.naturalHeight);
}

function drawContain(ctx, img, w, h){
  const iw = img.naturalWidth;
  const ih = img.naturalHeight;
  const scale = Math.min(w / iw, h / ih);
  const dw = iw * scale;
  const dh = ih * scale;
  const dx = (w - dw) / 2;
  const dy = (h - dh) / 2;
  ctx.drawImage(img, dx, dy, dw, dh);
}

function baseName(path){
  return path.split("/").pop().replace(/\.[^/.]+$/, "");
}

function downloadCaptureImage(entry){
  const FIXED_SIZE = 1600;
  const imgA = new Image();
  const imgB = new Image();
  let loaded = 0;

  function onBothLoaded(){
    const areaA = imgA.naturalWidth * imgA.naturalHeight;
    const areaB = imgB.naturalWidth * imgB.naturalHeight;
    const bigger = areaA >= areaB ? imgA : imgB;

    let canvasW, canvasH;
    if (cropToggle.checked) {
      const maxNative = Math.max(bigger.naturalWidth, bigger.naturalHeight);
      const size = fullResToggle.checked ? maxNative : FIXED_SIZE;
      canvasW = size;
      canvasH = size;
    } else if (fullResToggle.checked) {
      canvasW = bigger.naturalWidth;
      canvasH = bigger.naturalHeight;
    } else {
      const scale = FIXED_SIZE / Math.max(bigger.naturalWidth, bigger.naturalHeight);
      canvasW = Math.round(bigger.naturalWidth * scale);
      canvasH = Math.round(bigger.naturalHeight * scale);
    }

    const canvas = document.createElement("canvas");
    canvas.width = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext("2d");
    ctx.globalCompositeOperation = "source-over";
    if (cropToggle.checked) {
      drawCover(ctx, imgA, canvasW, canvasH);
      ctx.globalCompositeOperation = canvasBlendName(entry.blend);
      drawCover(ctx, imgB, canvasW, canvasH);
    } else if (fullResToggle.checked) {
      drawCenteredNative(ctx, imgA, canvasW, canvasH);
      ctx.globalCompositeOperation = canvasBlendName(entry.blend);
      drawCenteredNative(ctx, imgB, canvasW, canvasH);
    } else {
      drawContain(ctx, imgA, canvasW, canvasH);
      ctx.globalCompositeOperation = canvasBlendName(entry.blend);
      drawContain(ctx, imgB, canvasW, canvasH);
    }
    ctx.globalCompositeOperation = "source-over";

    const activeFilter = stageInner.style.filter;
    let finalCanvas = canvas;
    if (activeFilter && activeFilter !== "none") {
      const filtered = document.createElement("canvas");
      filtered.width = canvasW;
      filtered.height = canvasH;
      const fctx = filtered.getContext("2d");
      fctx.filter = activeFilter;
      fctx.drawImage(canvas, 0, 0);
      finalCanvas = filtered;
    }

    finalCanvas.toBlob(function(blob){
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const stamp = entry.time.replace(/[:.]/g, "-");
      link.href = url;
      link.download = "blend_" + baseName(entry.a) + "_" + baseName(entry.b) + "_" + entry.blend + "_" + stamp + ".png";
      link.click();
      URL.revokeObjectURL(url);
    }, "image/png");
  }

  imgA.onload = function(){ loaded++; if (loaded === 2) onBothLoaded(); };
  imgB.onload = function(){ loaded++; if (loaded === 2) onBothLoaded(); };
  imgA.src = entry.a;
  imgB.src = entry.b;
}

document.addEventListener("keydown", function(e){
  if (e.key.toLowerCase() === "i") {
    e.preventDefault();
    capture();
  }
});

document.getElementById("downloadBtn").addEventListener("click", function(){
  const blob = new Blob([JSON.stringify(captures, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "blend-captures.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("clearBtn").addEventListener("click", function(){
  captures = [];
  localStorage.removeItem(STORAGE_KEY);
  renderLog();
});
</script>

</body>
</html>
