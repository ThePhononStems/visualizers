<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<style>

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;
    width:100%;
    height:100%;

    background:transparent;

    overflow:hidden;

    font-family:Arial,Helvetica,sans-serif;

}

.player{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;

    background:#000;

}

.video-area{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:#000;

    cursor:pointer;

}

video{

    width:100%;
    height:100%;

    object-fit:contain;

    background:#000;

}

.controls{

    padding:14px 18px 18px;

    background:#000;

}

.timeline{

    width:100%;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="player">

    <div
        class="video-area"
        id="videoArea">

        <video
            id="video"
            preload="metadata"
            playsinline>

            <source
                id="videoSource"
                src=""
                type="video/mp4">

        </video>

    </div>

    <div class="controls">

        <input
            id="timeline"
            class="timeline"
            type="range"
            min="0"
            max="1000"
            value="0"
            step="1">

    </div>

</div>

<script>

const videos={

    portada:"videos/FINAL WEB PORTADA VIDEO SQUARE_1.mp4",

    palestina:"videos/Palestina-94mb.mp4"

};

const params=new URLSearchParams(window.location.search);

const id=params.get("id") || "portada";

const video=document.getElementById("video");

const source=document.getElementById("videoSource");

source.src=videos[id];

video.load();

const videoArea=document.getElementById("videoArea");

const timeline=document.getElementById("timeline");

let seeking=false;

videoArea.onclick=()=>{

    if(video.paused){

        video.play();

    }else{

        video.pause();

    }

};

video.addEventListener("timeupdate",()=>{

    if(!seeking && Number.isFinite(video.duration)){

        timeline.value=(video.currentTime/video.duration)*1000;

    }

});

timeline.addEventListener("input",()=>{

    seeking=true;

    if(Number.isFinite(video.duration)){

        video.currentTime=(timeline.value/1000)*video.duration;

    }

});

timeline.addEventListener("change",()=>{

    seeking=false;

});

</script>

</body>

</html>
