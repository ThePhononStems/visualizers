<style>
*{
  box-sizing:border-box;
}
.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}
html,
body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

/* ============================================================
   EDIT HERE: video list, stills, and info-panel text.
   To add a video: add an entry below, add its file to /videos,
   and add a still to /posters (or point "poster" at any image URL).
   ============================================================ */
</style>
</head>
<body>

<h1 class="sr-only">Portada &amp; Palestina — SWT Media Video Library</h1>

<noscript>
  <p>This page requires JavaScript to play videos. Direct links:</p>
  <ul>
    <li><a href="videos/FINAL WEB PORTADA VIDEO SQUARE_1.mp4">Portada</a></li>
    <li><a href="videos/Palestina-94mb.mp4">Palestina</a></li>
  </ul>
</noscript>

<div class="layout" id="layout">

  <div class="title-list-wrap">
    <input
      id="searchBox"
      class="search-box"
      type="text"
      placeholder="Search videos..."
      autocomplete="off">
    <div class="title-list" id="titleList"></div>
  </div>

  <div class="player-col" id="playerCol">
    <div class="player">
      <div class="video-area" id="videoArea">
        <video id="video" preload="metadata" playsinline></video>
        <div class="play-badge" id="playBadge">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff">
            <path d="M8 5v14l11-7z"></path>
          </svg>
        </div>
      </div>
      <div class="controls">
        <div class="progress-wrap">
          <div class="progress-track"></div>
          <div class="progress-fill" id="progressFill"></div>
          <input id="timeline" class="timeline" type="range" min="0" max="1000" value="0" step="1">
        </div>
      </div>
    </div>
  </div>

</div>

<style>
.layout{
  display:flex;
  height:100vh;
  background:#111;
}
.title-list-wrap{
  flex:0 0 30%;
  min-width:260px;
  height:100%;
  display:flex;
  flex-direction:column;
  background:#1b1b1b;
}
.search-box{
  flex:none;
  margin:30px 30px 0;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid #2a2a2a;
  background:#242424;
  color:#fff;
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:border-color .25s;
}
.search-box::placeholder{
  color:#8a8a8a;
}
.search-box:focus{
  border-color:#5ec8ff;
}
.no-results{
  color:#8a8a8a;
  font-size:14px;
  padding:14px 18px;
}
.title-list{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow-y:auto;
  padding:14px 30px 30px;
}
.player-col{
  flex:1;
  min-width:0;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0b0b;
  padding:60px;
}
.player-col .player{
  width:min(1000px,100%);
}

.title-btn{
  display:block;
  width:100%;
  text-align:left;
  padding:14px 18px;
  border:1px solid transparent;
  border-radius:12px;
  background:#242424;
  color:#fff;
  font-size:15px;
  font-family:inherit;
  cursor:pointer;
  transition:background .25s, border-color .25s, transform .15s, color .25s;
}
.title-btn:hover{
  background:#303030;
  border-color:#5ec8ff;
  color:#5ec8ff;
  transform:translateX(6px);
}
.title-btn.active{
  border-color:#5ec8ff;
  color:#5ec8ff;
}
.title-note{
  font-style:italic;
  font-size:0.8em;
  color:#4caf7d;
}
.title-wrap{
  border-radius:12px;
}
.info-panel{
  padding:14px 18px 18px;
  margin-top:6px;
  background:#151515;
  border:1px solid #2a2a2a;
  border-radius:12px;
  color:#c9c9c9;
  font-size:13px;
  line-height:1.5;
}
.info-panel p{
  margin:0 0 10px;
}
.info-meta{
  display:flex;
  align-items:center;
  gap:6px;
  color:#9a9a9a;
  margin-bottom:8px;
}
.info-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.tag{
  background:#242424;
  color:#5ec8ff;
  padding:3px 9px;
  border-radius:6px;
  font-size:12px;
}

.player{
  display:flex;
  flex-direction:column;
  background:#000;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.65);
}
.video-area{
  position:relative;
  aspect-ratio:16/9;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#000;
  cursor:pointer;
}
video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}
.play-badge{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.play-badge svg{
  width:56px;
  height:56px;
  padding:16px;
  background:rgba(0,0,0,0.35);
  border:1.5px solid rgba(255,255,255,0.7);
  border-radius:50%;
  box-sizing:border-box;
}
.play-badge.hidden{
  display:none;
}
.controls{
  padding:14px 18px 18px;
  background:#000;
}
.progress-wrap{
  position:relative;
  height:13px;
  display:flex;
  align-items:center;
}
.progress-track{
  position:absolute;
  left:0;
  right:0;
  height:4px;
  border-radius:2px;
  background:#333333;
  pointer-events:none;
}
.progress-fill{
  position:absolute;
  left:0;
  height:4px;
  border-radius:2px;
  background:#1f6f6b;
  width:0%;
  pointer-events:none;
}
.timeline{
  position:relative;
  z-index:1;
  -webkit-appearance:none;
  appearance:none;
  width:100%;
  height:13px;
  background:transparent;
  cursor:pointer;
  outline:none;
  margin:0;
}
.timeline::-webkit-slider-runnable-track{
  background:transparent;
  height:4px;
}
.timeline::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:13px;
  height:13px;
  border-radius:50%;
  background:#1f6f6b;
  cursor:pointer;
  margin-top:-4.5px;
}
.timeline::-moz-range-track{
  background:transparent;
  height:4px;
}
.timeline::-moz-range-progress{
  background:transparent;
  height:4px;
}
.timeline::-moz-range-thumb{
  width:13px;
  height:13px;
  border-radius:50%;
  background:#1f6f6b;
  border:none;
  cursor:pointer;
}

@media (max-width:700px){
  html,
  body{
    height:auto;
    overflow:visible;
  }
  .layout{
    flex-direction:column;
    height:auto;
  }
  .title-list-wrap{
    flex:none;
    width:100%;
    height:auto;
  }
  .title-list{
    height:auto;
    overflow-y:visible;
    padding:14px 20px 20px;
  }
  .search-box{
    margin:20px 20px 0;
  }
  .player-col{
    height:auto;
    display:block;
    padding:20px;
  }
}
</style>

<script>
/* ============================================================
   EDIT HERE: this is the full list of videos shown in the
   left column. "poster" is the still shown before playback.
   Runtime and tags are free text -- update as needed.
   ============================================================ */
const videos = [
  {
    id: "portada",
    title: "Portada",
    src: "videos/FINAL WEB PORTADA VIDEO SQUARE_1.mp4",
    poster: "posters/webportada-still.png",
    runtime: "--:--",
    tags: ["Intro"],
    description: "Placeholder description for Portada. Replace this text with the real summary of the video's content."
  },
  {
    id: "palestina",
    title: "Palestina",
    src: "videos/Palestina-94mb.mp4",
    poster: "posters/Palestina-still.png",
    runtime: "--:--",
    tags: ["Documentary"],
    description: "Placeholder description for Palestina. Replace this text with the real summary of the video's content."
  },
  {
    id: "crematorium",
    title: "Excerpt: The Crematorium / Mountain Top Removal",
    src: "videos/(Excerpt) The Crematorium (BW).mp4",
    poster: "posters/CremaBWstill.jpg",
    runtime: "--:--",
    tags: ["Excerpt"],
    description: "Placeholder description for The Crematorium. Replace this text with the real summary of the video's content."
  },
  {
    id: "crematorium-abridged",
    title: "The Crematorium",
    src: "videos/CREMA-ABRIDGED-072023a-2160-YT-FINAL1-103x-pitch_2.mp4",
    poster: "posters/CrematoriumStill.jpg",
    runtime: "--:--",
    tags: ["Abridged"],
    description: "Placeholder description for The Crematorium (Abridged). Replace this text with the real summary of the video's content."
  },
  {
    id: "e3-excerpt",
    title: "Carlos Yescas @ World Cheese Awards",
    titleNote: "(spanish)",
    src: "videos/E3-under3 MIN EXCERPT for YTshortsAndSWT-lumetri_downsizeforGithub.mp4",
    poster: "posters/CarlosBern.png",
    runtime: "--:--",
    tags: ["Excerpt"],
    description: "Placeholder description for E3 (Excerpt). Replace this text with the real summary of the video's content."
  },
  {
    id: "media-distorts-climate-science",
    title: "Media Distorts Climate Science",
    src: "videos/MEDIADISTORTSCLIMATESCIENCE_1.mp4",
    poster: "posters/stephenschneider-videostill11c.jpg",
    runtime: "--:--",
    tags: ["Documentary"],
    description: "Placeholder description for Media Distorts Climate Science. Replace this text with the real summary of the video's content."
  }
];

const MOBILE_BREAKPOINT = 700;

const titleList = document.getElementById("titleList");
const searchBox = document.getElementById("searchBox");
const playerCol = document.getElementById("playerCol");
const video = document.getElementById("video");
const videoArea = document.getElementById("videoArea");
const playBadge = document.getElementById("playBadge");
const timeline = document.getElementById("timeline");
const progressFill = document.getElementById("progressFill");

const params = new URLSearchParams(window.location.search);
const startId = params.get("id") || videos[0].id;

let activeId = null;
let openId = null;
let seeking = false;

function loadVideo(item, autoplay){
  video.pause();
  video.poster = item.poster;
  video.src = item.src;
  video.load();
  timeline.value = 0;
  paintTimeline();
  if (autoplay) {
    video.play();
  }
}

function selectTitle(item, opts){
  opts = opts || {};
  activeId = item.id;
  if (opts.toggle === false) {
    openId = null;
  } else {
    openId = (openId === item.id) ? null : item.id;
  }
  loadVideo(item, false);
  renderList();
  if (opts.scroll) {
    maybeScrollToPlayer();
  }
}

function maybeScrollToPlayer(){
  if (window.innerWidth <= MOBILE_BREAKPOINT) {
    playerCol.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function matchesSearch(item, query){
  if (!query) return true;
  const haystack = (
    item.title + " " +
    (item.titleNote || "") + " " +
    item.description + " " +
    item.tags.join(" ")
  ).toLowerCase();
  return haystack.indexOf(query) !== -1;
}

function renderList(){
  titleList.innerHTML = "";
  const query = searchBox.value.trim().toLowerCase();
  const visible = videos.filter(function(item){
    return matchesSearch(item, query);
  });

  if (visible.length === 0) {
    const empty = document.createElement("div");
    empty.className = "no-results";
    empty.textContent = "No videos match your search.";
    titleList.appendChild(empty);
    return;
  }

  visible.forEach(function(item){
    const wrap = document.createElement("div");
    wrap.className = "title-wrap";

    const btn = document.createElement("button");
    btn.className = "title-btn" + (activeId === item.id ? " active" : "");
    btn.innerHTML = item.title +
      (item.titleNote ? ' <span class="title-note">' + item.titleNote + '</span>' : '');
    btn.addEventListener("click", function(){
      selectTitle(item, { scroll: true });
    });
    wrap.appendChild(btn);

    if (openId === item.id) {
      const panel = document.createElement("div");
      panel.className = "info-panel";
      panel.innerHTML =
        '<p>' + item.description + '</p>' +
        '<div class="info-meta">' + item.runtime + '</div>' +
        '<div class="info-tags">' +
        item.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join("") +
        '</div>';
      wrap.appendChild(panel);
    }

    titleList.appendChild(wrap);
  });
}

searchBox.addEventListener("input", function(){
  renderList();
});

videoArea.addEventListener("click", function(){
  if (video.paused) {
    video.play();
  } else {
    video.pause();
  }
});

video.addEventListener("play", function(){
  playBadge.classList.add("hidden");
});
video.addEventListener("pause", function(){
  playBadge.classList.remove("hidden");
});
video.addEventListener("ended", function(){
  playBadge.classList.remove("hidden");
});

function paintTimeline(){
  const pct = (timeline.value / timeline.max) * 100;
  progressFill.style.width = pct + "%";
}

video.addEventListener("timeupdate", function(){
  if (!seeking && Number.isFinite(video.duration)) {
    timeline.value = (video.currentTime / video.duration) * 1000;
    paintTimeline();
  }
});
timeline.addEventListener("input", function(){
  seeking = true;
  if (Number.isFinite(video.duration)) {
    video.currentTime = (timeline.value / 1000) * video.duration;
  }
  paintTimeline();
});
timeline.addEventListener("change", function(){
  seeking = false;
});

paintTimeline();

const initial = videos.find(function(v){ return v.id === startId; }) || videos[0];
selectTitle(initial, { scroll: false, toggle: false });
</script>

</body>
</html>
